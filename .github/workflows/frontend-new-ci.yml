name: Frontend New CI

on:
  pull_request:
    paths:
      - "frontend_new/**"
      - ".github/workflows/frontend-new-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend_new/**"
      - ".github/workflows/frontend-new-ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend_new/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build


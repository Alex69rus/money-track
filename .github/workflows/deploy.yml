name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: alex69rus/money-track/frontend
  BACKEND_IMAGE_NAME: alex69rus/money-track/backend

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build frontend
      run: npm run build
      env:
        REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL || secrets.REACT_APP_API_URL || 'https://localhost' }}
        REACT_APP_AI_WEBHOOK_URL: ${{ vars.REACT_APP_AI_WEBHOOK_URL || secrets.REACT_APP_AI_WEBHOOK_URL || 'https://localhost/webhook' }}
        DISABLE_ESLINT_PLUGIN: true

  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend_new
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
    
    - name: Install backend dependencies
      run: uv sync --group dev
    
    - name: Run static checks
      run: |
        uv run ruff check .
        uv run mypy .

  build-and-push:
    needs: [validate-frontend, validate-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: backend
            context: ./backend_new

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: alex69rus
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ matrix.service == 'frontend' && env.FRONTEND_IMAGE_NAME || env.BACKEND_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push ARM64 Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.service }}-arm64
        cache-to: type=gha,mode=min,scope=${{ matrix.service }}-arm64
        build-args: |
          ${{ matrix.service == 'frontend' && format('REACT_APP_API_URL={0}', vars.REACT_APP_API_URL || secrets.REACT_APP_API_URL || '') || '' }}
          ${{ matrix.service == 'frontend' && format('REACT_APP_AI_WEBHOOK_URL={0}', vars.REACT_APP_AI_WEBHOOK_URL || secrets.REACT_APP_AI_WEBHOOK_URL || '') || '' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e  # Exit on any error
          set -u  # Exit on undefined variables
          set -o pipefail  # Exit on pipe failures
          
          # Navigate to deployment directory
          cd /opt/money-track
          
          # Update repository safely without removing files
          if [ -d ".git" ]; then
            echo "Updating existing repository..."
            git fetch origin || { echo "ERROR: Failed to fetch from origin"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: Failed to reset to origin/main"; exit 1; }
          else
            echo "Initializing new repository..."
            git init || { echo "ERROR: Failed to initialize git repository"; exit 1; }
            git remote add origin https://github.com/${{ github.repository }}.git || { echo "ERROR: Failed to add remote origin"; exit 1; }
            git fetch origin || { echo "ERROR: Failed to fetch from origin"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: Failed to reset to origin/main"; exit 1; }
            git branch --set-upstream-to=origin/main main || { echo "ERROR: Failed to set upstream branch"; exit 1; }
          fi
          
          # Verify critical files exist
          if [ ! -f "docker-compose.prod.yml" ]; then
            echo "ERROR: docker-compose.prod.yml not found after git checkout"
            ls -la
            exit 1
          fi
          echo "✅ Repository updated successfully"
          
          # Create production environment file
          cat > .env.prod << EOF
          POSTGRES_DB=moneytrack
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_URL=${{ vars.TELEGRAM_WEBHOOK_URL || secrets.TELEGRAM_WEBHOOK_URL || 'https://money-track.org/api/telegram/webhook' }}
          TELEGRAM_WEBHOOK_SECRET=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || '' }}
          OPENAI_MODEL=${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
          ENVIRONMENT=Production
          API_HOST=0.0.0.0
          API_PORT=8000
          BACKEND_IMAGE=ghcr.io/alex69rus/money-track/backend:latest
          FRONTEND_IMAGE=ghcr.io/alex69rus/money-track/frontend:latest
          DOMAIN=${{ vars.DOMAIN || secrets.DOMAIN || 'localhost' }}
          EMAIL=${{ vars.EMAIL || secrets.EMAIL || 'admin@localhost.com' }}
          REACT_APP_API_URL=${{ vars.REACT_APP_API_URL || secrets.REACT_APP_API_URL }}
          REACT_APP_AI_WEBHOOK_URL=${{ vars.REACT_APP_AI_WEBHOOK_URL || secrets.REACT_APP_AI_WEBHOOK_URL }}
          N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY || 'default-encryption-key-change-me' }}
          EOF

          # Validate Telegram webhook configuration for backend ingestion
          telegram_webhook_url="$(grep '^TELEGRAM_WEBHOOK_URL=' .env.prod | cut -d= -f2-)"
          telegram_webhook_secret="$(grep '^TELEGRAM_WEBHOOK_SECRET=' .env.prod | cut -d= -f2-)"
          if [ -z "${telegram_webhook_url}" ]; then
            echo "ERROR: TELEGRAM_WEBHOOK_URL must be set for backend Telegram ingestion"
            exit 1
          fi
          if [ -z "${telegram_webhook_secret}" ]; then
            echo "ERROR: TELEGRAM_WEBHOOK_SECRET must be set when TELEGRAM_WEBHOOK_URL is set"
            exit 1
          fi
          case "${telegram_webhook_url}" in
            https://*/api/telegram/webhook) ;;
            *)
              echo "ERROR: TELEGRAM_WEBHOOK_URL must target backend endpoint /api/telegram/webhook (got ${telegram_webhook_url})"
              exit 1
              ;;
          esac
          
          # Login to container registry
          echo "Logging in to container registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u alex69rus --password-stdin || { echo "ERROR: Failed to login to container registry"; exit 1; }
          echo "✅ Logged in successfully"
          
          # Pull latest images
          echo "Pulling latest Docker images..."
          docker pull ghcr.io/alex69rus/money-track/frontend:latest || { echo "ERROR: Failed to pull frontend image"; exit 1; }
          docker pull ghcr.io/alex69rus/money-track/backend:latest || { echo "ERROR: Failed to pull backend image"; exit 1; }
          echo "✅ Images pulled successfully"
          
          # Stop existing services (allow this to fail for first-time deployment)
          echo "Stopping existing services..."
          docker-compose -f docker-compose.prod.yml --env-file .env.prod down || echo "No existing services to stop"
          
          # Create SSL certificate directory and deploy Cloudflare certificates
          echo "Setting up Cloudflare Origin Certificates..."
          mkdir -p ssl
          echo "${{ secrets.CLOUDFLARE_CERT }}" > ssl/cloudflare-cert.pem || { echo "ERROR: Failed to create certificate file"; exit 1; }
          echo "${{ secrets.CLOUDFLARE_KEY }}" > ssl/cloudflare-key.pem || { echo "ERROR: Failed to create private key file"; exit 1; }
          chmod 600 ssl/cloudflare-key.pem
          echo "✅ Cloudflare certificates deployed"
          
          # Start services
          echo "Starting services with Cloudflare SSL..."
          docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d || { echo "ERROR: Failed to start services"; exit 1; }
          echo "✅ Services started successfully"
          
          # Wait for services to be ready
          echo "Waiting for services to initialize..."
          sleep 30

          # Force Telegram webhook to backend endpoint after all services are up.
          # This prevents n8n Telegram Trigger workflows from winning registration races.
          echo "Setting Telegram webhook to backend endpoint..."
          telegram_bot_token="$(grep '^TELEGRAM_BOT_TOKEN=' .env.prod | cut -d= -f2-)"
          set_webhook_result="$(curl -sS -X POST "https://api.telegram.org/bot${telegram_bot_token}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${telegram_webhook_url}\",\"secret_token\":\"${telegram_webhook_secret}\",\"allowed_updates\":[\"message\",\"edited_message\"]}")"
          echo "Telegram setWebhook result: ${set_webhook_result}"
          echo "${set_webhook_result}" | grep -q '"ok":true' || { echo "ERROR: Telegram setWebhook failed"; exit 1; }

          webhook_info_result="$(curl -sS "https://api.telegram.org/bot${telegram_bot_token}/getWebhookInfo")"
          echo "Telegram getWebhookInfo result: ${webhook_info_result}"
          echo "${webhook_info_result}" | grep -q "\"url\":\"${telegram_webhook_url}\"" || {
            echo "ERROR: Telegram webhook URL mismatch after deployment"
            exit 1
          }
          
          # Verify services are running
          echo "Verifying services are running..."
          docker-compose -f docker-compose.prod.yml --env-file .env.prod ps || { echo "ERROR: Failed to check service status"; exit 1; }
          
          # Health check
          echo "Performing health checks..."
          if curl -f http://localhost/health >/dev/null 2>&1 || curl -f http://localhost/api/health >/dev/null 2>&1; then
            echo "✅ Health check passed"
          else
            echo "⚠️  Health check failed - services may still be starting up"
            # Don't fail deployment on health check failure as services might still be initializing
          fi
          
          # Clean up old images
          echo "Cleaning up old Docker images..."
          docker image prune -f || echo "⚠️  Failed to clean up old images"
          
          echo "🎉 Deployment completed successfully"

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        if [[ "${{ needs.deploy.result }}" == "success" ]]; then
          echo "✅ Deployment successful"
        else
          echo "❌ Deployment failed"
        fi

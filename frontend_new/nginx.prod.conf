server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The deployment checks this uncached file to prove the expected image is live.
    location = /version.json {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    # Vite hashes built assets, so immutable caching is safe for these files.
    location ~* \.(?:css|js|mjs|map|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The SPA owns all application routes after the outer nginx routes /api and /n8n.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

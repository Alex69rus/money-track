<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Category Filtered Transactions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Background Mockup (Simulating the Analytics Screen behind) -->
<div class="fixed inset-0 p-6 opacity-40 grayscale pointer-events-none">
<div class="flex justify-between items-center mb-8">
<span class="material-symbols-outlined">arrow_back_ios</span>
<h2 class="text-lg font-semibold">Analytics</h2>
<span class="material-symbols-outlined">calendar_month</span>
</div>
<div class="w-full h-48 bg-primary/20 rounded-2xl mb-6 flex items-center justify-center">
<div class="w-32 h-32 rounded-full border-8 border-primary border-t-transparent animate-spin-slow"></div>
</div>
<div class="space-y-4">
<div class="h-16 bg-slate-800/50 rounded-xl"></div>
<div class="h-16 bg-slate-800/50 rounded-xl"></div>
<div class="h-16 bg-slate-800/50 rounded-xl"></div>
</div>
</div>
<!-- Dimmed Overlay -->
<div class="fixed inset-0 bg-black/60 transition-opacity"></div>

<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col max-h-[92vh] bg-slate-50 dark:bg-slate-900 rounded-t-2xl shadow-2xl ring-1 ring-white/10">

<div class="flex flex-col items-center pt-3 pb-2 sticky top-0 bg-slate-50 dark:bg-slate-900 rounded-t-2xl z-20 relative">
<!-- Header Section -->
<button aria-label="Close" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button><div class="w-full px-6 flex flex-col items-center">
<div class="flex items-center justify-center size-14 rounded-2xl bg-primary/10 text-primary mb-3">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">restaurant</span>
</div>
<h4 class="text-slate-500 dark:text-slate-400 text-sm font-semibold tracking-wider uppercase">Food &amp; Drinks</h4>
<h1 class="text-slate-900 dark:text-white text-4xl font-bold mt-1 tracking-tight">-$450.00</h1>
<p class="text-slate-400 dark:text-slate-500 text-xs mt-1">Oct 1, 2023 - Oct 31, 2023</p>
</div>
</div>
<!-- Scrollable Transaction List -->
<div class="flex-1 overflow-y-auto hide-scrollbar px-4 pb-12 pt-4">
<div class="space-y-1">
<!-- Transaction Item 1 -->
<button class="w-full flex items-center gap-4 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-xl transition-colors text-left group">
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<p class="text-slate-900 dark:text-slate-100 font-semibold truncate">Starbucks</p>
<p class="text-slate-900 dark:text-slate-100 font-bold whitespace-nowrap">-$6.50</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-2 truncate">Morning coffee on the way to work</p>
<div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#coffee</span>

<div class="h-1 w-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-1 shrink-0"></div>
<span class="text-slate-400 dark:text-slate-500 text-[11px] whitespace-nowrap">Oct 12 • 08:45 AM</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Divider -->
<div class="mx-3 border-b border-slate-200 dark:border-slate-800/50"></div>

<button class="w-full flex items-center gap-4 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-xl transition-colors text-left group">

<div class="flex justify-between items-start mb-0.5">
<p class="text-slate-900 dark:text-slate-100 font-semibold truncate">Whole Foods</p>
<p class="text-slate-900 dark:text-slate-100 font-bold whitespace-nowrap">-$82.20</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-2 truncate">Weekly grocery shopping</p>
<div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#groceries</span>
<div class="h-1 w-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-1 shrink-0"></div>
<span class="text-slate-400 dark:text-slate-500 text-[11px] whitespace-nowrap">Oct 10 • 06:30 PM</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Divider -->
<div class="mx-3 border-b border-slate-200 dark:border-slate-800/50"></div>
<!-- Transaction Item 3 -->
<button class="w-full flex items-center gap-4 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-xl transition-colors text-left group">
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<p class="text-slate-900 dark:text-slate-100 font-semibold truncate">Burger King</p>
<p class="text-slate-900 dark:text-slate-100 font-bold whitespace-nowrap">-$12.00</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-2 truncate">Late night snack</p>
<div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#fastfood</span>
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#dinner</span>
<div class="h-1 w-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-1 shrink-0"></div>

</div>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Divider -->
<div class="mx-3 border-b border-slate-200 dark:border-slate-800/50"></div>
<!-- Transaction Item 4 -->
<button class="w-full flex items-center gap-4 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-xl transition-colors text-left group">
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">

</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-2 truncate">Drinks with colleagues</p>
<div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#social</span>
<div class="h-1 w-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-1 shrink-0"></div>

</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">chevron_right</span>

<!-- Divider -->
<div class="mx-3 border-b border-slate-200 dark:border-slate-800/50"></div>

<button class="w-full flex items-center gap-4 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-xl transition-colors text-left group">

<div class="flex justify-between items-start mb-0.5">

</div>

<div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[11px] font-bold rounded-full uppercase tracking-tight">#family</span>
<div class="h-1 w-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-1 shrink-0"></div>

</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
<!-- Scroll Indicator Cushion -->
<div class="h-20"></div>
</div>
<!-- Sticky Footer Action -->
</div>
<!-- Safe Area Overlay (iOS Home Indicator) -->
<div class="fixed bottom-0 inset-x-0 h-8 bg-slate-50 dark:bg-slate-900 z-[60]">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-800 rounded-full mx-auto mt-4"></div>
</div>
</body></html>

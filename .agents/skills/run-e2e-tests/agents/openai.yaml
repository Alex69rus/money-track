interface:
  display_name: "Run E2E Tests"
  short_description: "Run local E2E tests under sandbox constraints"
  default_prompt: "Use $run-e2e-tests to run and debug local end-to-end tests with sandbox-safe retries. If no parameters are provided, default to Python backend validation in backend_new via `uv run python scripts/run_integration_local_dual_api.py` (dev=http://127.0.0.1:8000, prod=http://127.0.0.1:8001). Use `uv run python scripts/run_integration_against_existing_api.py` only when API services are already running."
